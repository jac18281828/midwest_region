name: commitlint
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "*"
jobs:
  run-commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install -g @commitlint/{cli,config-conventional}
      - name: Validate all commits from PR
        run: |
          N=${{ github.event.pull_request.commits || 1 }}
          if git rev-parse HEAD~${N} >/dev/null 2>&1; then
            npx commitlint --from HEAD~${N} --to HEAD --verbose
          else
            npx commitlint --last ${N} --verbose
          fi
